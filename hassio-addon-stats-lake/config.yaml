name: HA Stats Lake
description: Long-term storage for Home Assistant sensor data. Samples a list of entities
  every 30 minutes to per-entity monthly CSVs, then consolidates nightly into a DuckLake
  (Parquet) on any S3-compatible store and optionally syncs raw CSVs to any rclone
  remote.
version: 720a765
slug: hassio-addon-stats-lake
url: https://github.com/kalw/hassio-addon-stats-lake
image: ghcr.io/kalw/hassio-addon-stats-lake/{arch}
homeassistant_api: true
hassio_api: true
hassio_role: manager
ingress: true
panel_icon: mdi:chart-box-outline
panel_title: Stats Lake
arch:
- aarch64
- amd64
init: false
options:
  tracked_entities:
  - sensor.example
  sample_interval_seconds: 1800
  consolidate_time: 02:00:00
  rclone_sync_time: 03:00:00
  s3_bucket: ''
  s3_endpoint: ''
  s3_key_id: ''
  s3_secret: ''
  rclone_remote: ''
  csv_retention_days: 90
schema:
  tracked_entities:
  - str
  sample_interval_seconds: int
  consolidate_time: str
  rclone_sync_time: str
  s3_bucket: str
  s3_endpoint: str
  s3_key_id: password
  s3_secret: password
  rclone_remote: str
  csv_retention_days: int
  group_entity: str?
